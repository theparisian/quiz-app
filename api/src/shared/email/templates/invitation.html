<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:40px auto;background:#ffffff;border-radius:8px;overflow:hidden;">
    <tr>
      <td style="background:#ffffff;padding:24px 32px;text-align:center;border-bottom:1px solid #e2e8f0;">
        <img src="{{ logoUrl }}" alt="Shh!" width="180" style="max-width:180px;height:auto;display:block;margin:0 auto;" />
      </td>
    </tr>
    <tr>
      <td style="padding:32px;">
        <p style="font-size:16px;color:#1e293b;margin:0 0 16px;">Salut,</p>
        <p style="font-size:15px;color:#475569;margin:0 0 8px;">Tu as été invité par <strong>{{ inviterName }}</strong> à rejoindre <strong>{{ cinemaName }}</strong> en tant que <strong>{{ role }}</strong>.</p>
        <p style="font-size:15px;color:#475569;margin:0 0 24px;">Clique ci-dessous pour finaliser ton inscription :</p>
        <table cellpadding="0" cellspacing="0" style="margin:0 auto 24px;">
          <tr>
            <td style="background:#2563eb;border-radius:6px;padding:12px 32px;">
              <a href="{{ link }}" style="color:#ffffff;text-decoration:none;font-size:16px;font-weight:bold;">Accepter l'invitation</a>
            </td>
          </tr>
        </table>
        <p style="font-size:13px;color:#94a3b8;margin:0;">Ce lien expire dans 7 jours.</p>
      </td>
    </tr>
    <tr>
      <td style="padding:16px 32px;background:#f8fafc;text-align:center;">
        <p style="font-size:12px;color:#94a3b8;margin:0;">Shh! — Plateforme de quizz cinéma</p>
      </td>
    </tr>
  </table>
</body>
</html>
