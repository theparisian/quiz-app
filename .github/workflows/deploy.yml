name: Deploy to VPS

# Déploiement automatique : pull, dépendances, migrations Prisma (monorepo), redémarrage PM2.
on:
  push:
    branches:
      - master
      - rewrite/v2
  workflow_dispatch:
    inputs:
      branch:
        description: Branche à déployer (laisse vide pour utiliser la branche du push)
        required: false
        type: string
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VPS
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
          PRIZE_HMAC_SECRET: ${{ secrets.PRIZE_HMAC_SECRET }}
          PRIZE_REDEEM_BASE_URL: ${{ secrets.PRIZE_REDEEM_BASE_URL }}
          PRIZE_UNSUBSCRIBE_BASE_URL: ${{ secrets.PRIZE_UNSUBSCRIBE_BASE_URL }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
          # Observabilité (PR8) — optionnels : absent = non modifié sur le VPS
          SENTRY_DSN_API: ${{ secrets.SENTRY_DSN_API }}
          NEXT_PUBLIC_SENTRY_DSN_ADMIN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN_ADMIN }}
          NEXT_PUBLIC_SENTRY_DSN_CONSOLE: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN_CONSOLE }}
          NEXT_PUBLIC_SENTRY_DSN_PLAYER: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN_PLAYER }}
          NEXT_PUBLIC_SENTRY_DSN_MOBILE: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN_MOBILE }}
          SENTRY_ENVIRONMENT: ${{ secrets.SENTRY_ENVIRONMENT }}
          ADMIN_ALERT_EMAILS: ${{ secrets.ADMIN_ALERT_EMAILS }}
          HEALTH_CHECK_TOKEN: ${{ secrets.HEALTH_CHECK_TOKEN }}
        run: |
          set -euo pipefail

          workflow_emit_optional_b64() {
            local n="$1"
            local v="${2:-}"
            if [ -z "$v" ]; then return 0; fi
            printf '%s\n' "${n}_B64=$(printf '%s' "$v" | base64 -w0)"
          }

          workflow_emit_optional_decode_and_upsert() {
            local n="$1"
            local v="${2:-}"
            if [ -z "$v" ]; then return 0; fi
            printf '%s\n' \
              'if [ -n "${'"$n"'_B64:-}" ]; then' \
              '  '"$n"'="$(printf "%s" "$'"$n"'_B64" | base64 -d)"' \
              '  upsert_env '"$n"' "$'"$n"'"' \
              'fi'
          }
          for key in SESSION_SECRET JWT_SECRET DATABASE_URL SMTP_HOST SMTP_PORT SMTP_USER SMTP_PASS SMTP_FROM SMTP_FROM_NAME PRIZE_HMAC_SECRET PRIZE_REDEEM_BASE_URL PRIZE_UNSUBSCRIBE_BASE_URL; do
            eval "v=\${$key:-}"
            if [ -z "$v" ]; then
              echo "::error::Secret GitHub $key manquant ou vide."
              exit 1
            fi
          done

          HAS_CORS=0
          CORS_ORIGINS_B64=""
          if [ -n "${CORS_ORIGINS:-}" ]; then
            HAS_CORS=1
            CORS_ORIGINS_B64="$(printf '%s' "$CORS_ORIGINS" | base64 -w0)"
          fi

          SESSION_SECRET_B64="$(printf '%s' "$SESSION_SECRET" | base64 -w0)"
          JWT_SECRET_B64="$(printf '%s' "$JWT_SECRET" | base64 -w0)"
          DATABASE_URL_B64="$(printf '%s' "$DATABASE_URL" | base64 -w0)"
          SMTP_HOST_B64="$(printf '%s' "$SMTP_HOST" | base64 -w0)"
          SMTP_PORT_B64="$(printf '%s' "$SMTP_PORT" | base64 -w0)"
          SMTP_USER_B64="$(printf '%s' "$SMTP_USER" | base64 -w0)"
          SMTP_PASS_B64="$(printf '%s' "$SMTP_PASS" | base64 -w0)"
          SMTP_FROM_B64="$(printf '%s' "$SMTP_FROM" | base64 -w0)"
          SMTP_FROM_NAME_B64="$(printf '%s' "$SMTP_FROM_NAME" | base64 -w0)"
          PRIZE_HMAC_SECRET_B64="$(printf '%s' "$PRIZE_HMAC_SECRET" | base64 -w0)"
          PRIZE_REDEEM_BASE_URL_B64="$(printf '%s' "$PRIZE_REDEEM_BASE_URL" | base64 -w0)"
          PRIZE_UNSUBSCRIBE_BASE_URL_B64="$(printf '%s' "$PRIZE_UNSUBSCRIBE_BASE_URL" | base64 -w0)"

          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          PM2_ESC="${PM2_APP_NAME:-quiz-api}"
          {
            echo 'set -euo pipefail'
            echo "cd \"${{ secrets.PROJECT_PATH }}\""
            echo "SESSION_SECRET_B64=${SESSION_SECRET_B64}"
            echo "JWT_SECRET_B64=${JWT_SECRET_B64}"
            echo "DATABASE_URL_B64=${DATABASE_URL_B64}"
            echo "SMTP_HOST_B64=${SMTP_HOST_B64}"
            echo "SMTP_PORT_B64=${SMTP_PORT_B64}"
            echo "SMTP_USER_B64=${SMTP_USER_B64}"
            echo "SMTP_PASS_B64=${SMTP_PASS_B64}"
            echo "SMTP_FROM_B64=${SMTP_FROM_B64}"
            echo "SMTP_FROM_NAME_B64=${SMTP_FROM_NAME_B64}"
            echo "PRIZE_HMAC_SECRET_B64=${PRIZE_HMAC_SECRET_B64}"
            echo "PRIZE_REDEEM_BASE_URL_B64=${PRIZE_REDEEM_BASE_URL_B64}"
            echo "PRIZE_UNSUBSCRIBE_BASE_URL_B64=${PRIZE_UNSUBSCRIBE_BASE_URL_B64}"
            if [ "$HAS_CORS" -eq 1 ]; then
              echo "CORS_ORIGINS_B64=${CORS_ORIGINS_B64}"
            fi
            workflow_emit_optional_b64 SENTRY_DSN_API "${SENTRY_DSN_API:-}"
            workflow_emit_optional_b64 NEXT_PUBLIC_SENTRY_DSN_ADMIN "${NEXT_PUBLIC_SENTRY_DSN_ADMIN:-}"
            workflow_emit_optional_b64 NEXT_PUBLIC_SENTRY_DSN_CONSOLE "${NEXT_PUBLIC_SENTRY_DSN_CONSOLE:-}"
            workflow_emit_optional_b64 NEXT_PUBLIC_SENTRY_DSN_PLAYER "${NEXT_PUBLIC_SENTRY_DSN_PLAYER:-}"
            workflow_emit_optional_b64 NEXT_PUBLIC_SENTRY_DSN_MOBILE "${NEXT_PUBLIC_SENTRY_DSN_MOBILE:-}"
            workflow_emit_optional_b64 SENTRY_ENVIRONMENT "${SENTRY_ENVIRONMENT:-}"
            workflow_emit_optional_b64 ADMIN_ALERT_EMAILS "${ADMIN_ALERT_EMAILS:-}"
            workflow_emit_optional_b64 HEALTH_CHECK_TOKEN "${HEALTH_CHECK_TOKEN:-}"
            echo 'SESSION_SECRET="$(printf "%s" "$SESSION_SECRET_B64" | base64 -d)"'
            echo 'JWT_SECRET="$(printf "%s" "$JWT_SECRET_B64" | base64 -d)"'
            echo 'DATABASE_URL="$(printf "%s" "$DATABASE_URL_B64" | base64 -d)"'
            echo 'SMTP_HOST="$(printf "%s" "$SMTP_HOST_B64" | base64 -d)"'
            echo 'SMTP_PORT="$(printf "%s" "$SMTP_PORT_B64" | base64 -d)"'
            echo 'SMTP_USER="$(printf "%s" "$SMTP_USER_B64" | base64 -d)"'
            echo 'SMTP_PASS="$(printf "%s" "$SMTP_PASS_B64" | base64 -d)"'
            echo 'SMTP_FROM="$(printf "%s" "$SMTP_FROM_B64" | base64 -d)"'
            echo 'SMTP_FROM_NAME="$(printf "%s" "$SMTP_FROM_NAME_B64" | base64 -d)"'
            echo 'PRIZE_HMAC_SECRET="$(printf "%s" "$PRIZE_HMAC_SECRET_B64" | base64 -d)"'
            echo 'PRIZE_REDEEM_BASE_URL="$(printf "%s" "$PRIZE_REDEEM_BASE_URL_B64" | base64 -d)"'
            echo 'PRIZE_UNSUBSCRIBE_BASE_URL="$(printf "%s" "$PRIZE_UNSUBSCRIBE_BASE_URL_B64" | base64 -d)"'
            if [ "$HAS_CORS" -eq 1 ]; then
              echo 'CORS_ORIGINS="$(printf "%s" "$CORS_ORIGINS_B64" | base64 -d)"'
            fi
            echo 'touch .env'
            echo 'upsert_env() {'
            echo '  key="$1"; val="$2"'
            echo '  if grep -q "^${key}=" .env 2>/dev/null; then grep -v "^${key}=" .env > .env.tmp && mv .env.tmp .env; fi'
            echo '  printf "%s=%s\n" "$key" "$val" >> .env'
            echo '}'
            echo 'upsert_env SESSION_SECRET "$SESSION_SECRET"'
            echo 'upsert_env JWT_SECRET "$JWT_SECRET"'
            echo 'upsert_env DATABASE_URL "$DATABASE_URL"'
            echo 'upsert_env SMTP_HOST "$SMTP_HOST"'
            echo 'upsert_env SMTP_PORT "$SMTP_PORT"'
            echo 'upsert_env SMTP_USER "$SMTP_USER"'
            echo 'upsert_env SMTP_PASS "$SMTP_PASS"'
            echo 'upsert_env SMTP_FROM "$SMTP_FROM"'
            echo 'upsert_env SMTP_FROM_NAME "$SMTP_FROM_NAME"'
            echo 'upsert_env PRIZE_HMAC_SECRET "$PRIZE_HMAC_SECRET"'
            echo 'upsert_env PRIZE_REDEEM_BASE_URL "$PRIZE_REDEEM_BASE_URL"'
            echo 'upsert_env PRIZE_UNSUBSCRIBE_BASE_URL "$PRIZE_UNSUBSCRIBE_BASE_URL"'
            if [ "$HAS_CORS" -eq 1 ]; then
              echo 'upsert_env CORS_ORIGINS "$CORS_ORIGINS"'
            fi
            workflow_emit_optional_decode_and_upsert SENTRY_DSN_API "${SENTRY_DSN_API:-}"
            workflow_emit_optional_decode_and_upsert NEXT_PUBLIC_SENTRY_DSN_ADMIN "${NEXT_PUBLIC_SENTRY_DSN_ADMIN:-}"
            workflow_emit_optional_decode_and_upsert NEXT_PUBLIC_SENTRY_DSN_CONSOLE "${NEXT_PUBLIC_SENTRY_DSN_CONSOLE:-}"
            workflow_emit_optional_decode_and_upsert NEXT_PUBLIC_SENTRY_DSN_PLAYER "${NEXT_PUBLIC_SENTRY_DSN_PLAYER:-}"
            workflow_emit_optional_decode_and_upsert NEXT_PUBLIC_SENTRY_DSN_MOBILE "${NEXT_PUBLIC_SENTRY_DSN_MOBILE:-}"
            workflow_emit_optional_decode_and_upsert SENTRY_ENVIRONMENT "${SENTRY_ENVIRONMENT:-}"
            workflow_emit_optional_decode_and_upsert ADMIN_ALERT_EMAILS "${ADMIN_ALERT_EMAILS:-}"
            workflow_emit_optional_decode_and_upsert HEALTH_CHECK_TOKEN "${HEALTH_CHECK_TOKEN:-}"
            echo 'git stash'
            echo "git fetch origin \"${BRANCH}\""
            echo "git checkout \"${BRANCH}\""
            echo "git pull --no-rebase origin \"${BRANCH}\""
            echo 'if [ -f pnpm-workspace.yaml ]; then'
            echo '  corepack enable'
            echo '  corepack prepare pnpm@9.15.4 --activate'
            echo '  pnpm install --frozen-lockfile'
            echo '  pnpm --filter @quiz-app/api db:generate'
            echo '  set -a'
            echo '  source ./.env'
            echo '  set +a'
            echo '  pnpm --filter @quiz-app/api db:migrate:deploy'
            echo "  pm2 restart \"${PM2_ESC}\" || pm2 reload \"${PM2_ESC}\" || pm2 restart quiz-app || true"
            echo 'else'
            echo '  npm install'
            echo "  (pm2 restart quiz-app || pm2 start npm --name 'quiz-app' -- start)"
            echo 'fi'
            echo "echo \"Déploiement (${BRANCH}) terminé.\""
          } | ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s
