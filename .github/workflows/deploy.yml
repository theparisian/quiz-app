name: Deploy to VPS

# Déploiement automatique : pull, dépendances, migrations Prisma (monorepo), redémarrage PM2.
on:
  push:
    branches:
      - master
      - rewrite/v2
  workflow_dispatch:
    inputs:
      branch:
        description: Branche à déployer (laisse vide pour utiliser la branche du push)
        required: false
        type: string
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VPS
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
        run: |
          set -euo pipefail
          if [ -z "${SESSION_SECRET:-}" ]; then
            echo "::error::Secret GitHub SESSION_SECRET manquant."
            exit 1
          fi
          B64="$(printf '%s' "$SESSION_SECRET" | base64 -w0)"
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          PM2_ESC="${PM2_APP_NAME:-quiz-api}"
          {
            echo 'set -euo pipefail'
            echo "cd \"${{ secrets.PROJECT_PATH }}\""
            echo "B64=${B64}"
            echo 'SECRET=$(printf "%s" "$B64" | base64 -d)'
            echo 'touch .env'
            echo 'if grep -q "^SESSION_SECRET=" .env 2>/dev/null; then grep -v "^SESSION_SECRET=" .env > .env.tmp && mv .env.tmp .env; fi'
            echo 'printf "SESSION_SECRET=%s\n" "$SECRET" >> .env'
            echo 'git stash'
            echo "git fetch origin \"${BRANCH}\""
            echo "git checkout \"${BRANCH}\""
            echo "git pull --no-rebase origin \"${BRANCH}\""
            echo 'if [ -f pnpm-workspace.yaml ]; then'
            echo '  corepack enable'
            echo '  corepack prepare pnpm@9.15.4 --activate'
            echo '  pnpm install --frozen-lockfile'
            echo '  pnpm --filter @quiz-app/api db:generate'
            echo '  pnpm --filter @quiz-app/api db:migrate:deploy'
            echo "  pm2 restart \"${PM2_ESC}\" || pm2 reload \"${PM2_ESC}\" || pm2 restart quiz-app || true"
            echo 'else'
            echo '  npm install'
            echo "  (pm2 restart quiz-app || pm2 start npm --name 'quiz-app' -- start)"
            echo 'fi'
            echo "echo \"Déploiement (${BRANCH}) terminé.\""
          } | ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s
